# Apache virtual host for the-killer.online
# The Next.js standalone server uses the incoming Host / X-Forwarded-* headers
# to build absolute redirect URLs (e.g. the locale redirect to /en).
# If X-Forwarded-Port / X-Forwarded-Proto are missing, it falls back to the
# internal container port (3000), which is why users end up on
# http://the-killer.online:3000.
#
# Enable the required modules:
#   a2enmod proxy proxy_http headers ssl rewrite
# Then place this file in /etc/apache2/sites-available/ and enable it:
#   a2ensite the-killer.online
#   apachectl configtest
#   systemctl reload apache2

# -----------------------------------------------------------------------------
# HTTP on port 80
# -----------------------------------------------------------------------------
<VirtualHost *:80>
    ServerName the-killer.online
    ServerAlias www.the-killer.online

    # If you want to force HTTPS, replace the proxy block below with:
    # Redirect permanent / https://the-killer.online/

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"
</VirtualHost>

# -----------------------------------------------------------------------------
# HTTPS on port 443 (only if you have a certificate)
# -----------------------------------------------------------------------------
<VirtualHost *:443>
    ServerName the-killer.online
    ServerAlias www.the-killer.online

    SSLEngine on
    SSLCertificateFile     /path/to/your/cert.pem
    SSLCertificateKeyFile  /path/to/your/key.pem

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"
</VirtualHost>
